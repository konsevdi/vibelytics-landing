<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" role="img" aria-labelledby="title desc">
  <title id="title">Vibelytics mark</title>
  <desc id="desc">Rounded-square gradient Vibelytics V mark with dark inset and decisive white signal shape.</desc>
  <defs>
    <linearGradient id="vl-stage-gradient" x1="52" y1="348" x2="348" y2="52" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3CF2B5"/>
      <stop offset="0.48" stop-color="#1EE7FF"/>
      <stop offset="1" stop-color="#A36AFF"/>
    </linearGradient>
    <radialGradient id="vl-ember-glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(318 305) rotate(-132) scale(245)">
      <stop offset="0" stop-color="#FF8B5C" stop-opacity="0.8"/>
      <stop offset="0.42" stop-color="#FF8B5C" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#FF8B5C" stop-opacity="0"/>
    </radialGradient>
    <filter id="vl-soft-shadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#000714" flood-opacity="0.45"/>
